<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEPRECATED - Contact Form - Prime Facility Services Group</title>
    
    <!-- Automatic redirect to new contact page -->
    <meta http-equiv="refresh" content="3;url=/contact/">
    <script>
        // Immediate redirect for JavaScript-enabled browsers
        window.location.replace('/contact/');
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { 
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background: transparent;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #C70532 0%, #E91E63 100%);
            color: white;
            padding: 16px 40px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(199, 5, 50, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(199, 5, 50, 0.6);
        }
        /* Form field focus states */
        .form-input:focus {
            outline: none;
            border-color: #C70532;
            box-shadow: 0 0 0 3px rgba(199, 5, 50, 0.1);
        }
        /* Animated gradient background */
        .form-container {
            background: linear-gradient(135deg, #F8F9FA 0%, #FFFFFF 50%, #F0F2F5 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <!-- DEPRECATION WARNING BANNER -->
    <div class="bg-red-600 text-white p-4 text-center font-bold">
        ⚠️ THIS FILE IS DEPRECATED - Please use contact.html instead ⚠️
    </div>
    
    <div class="form-container p-8 md:p-12 rounded-2xl shadow-xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl md:text-4xl font-bold text-[#03143A] mb-4">Request a Free Quote</h2>
            <p class="text-lg text-[#666] max-w-2xl mx-auto">
                Get a customized solution for your facility. We'll respond within 24 hours.
            </p>
        </div>
        
        <form id="contact-form" class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">
            <div>
                <label for="name" class="block text-[#03143A] font-semibold mb-2">Full Name *</label>
                <input type="text" id="name" name="name" required class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg transition-all duration-300">
            </div>
            <div>
                <label for="company" class="block text-[#03143A] font-semibold mb-2">Company Name *</label>
                <input type="text" id="company" name="company" required class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg transition-all duration-300">
            </div>
            <div>
                <label for="email" class="block text-[#03143A] font-semibold mb-2">Email Address *</label>
                <input type="email" id="email" name="email" required class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg transition-all duration-300">
            </div>
            <div>
                <label for="phone" class="block text-[#03143A] font-semibold mb-2">Phone Number *</label>
                <input type="tel" id="phone" name="phone" required class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg transition-all duration-300">
            </div>
            <div>
                <label for="service" class="block text-[#03143A] font-semibold mb-2">Service Type *</label>
                <select id="service" name="service" required class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg transition-all duration-300">
                    <option value="">Select a service</option>
                    <option value="staffing">Staffing Services</option>
                    <option value="kitchen">Kitchen Cleaning</option>
                    <option value="janitorial">Janitorial Services</option>
                    <option value="floor">Floor Care</option>
                    <option value="window">Window Cleaning</option>
                    <option value="valet">Valet Parking</option>
                    <option value="multiple">Multiple Services</option>
                </select>
            </div>
            <div>
                <label for="frequency" class="block text-[#03143A] font-semibold mb-2">Service Frequency</label>
                <select id="frequency" name="frequency" class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg transition-all duration-300">
                    <option value="">Select frequency</option>
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="biweekly">Bi-weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="onetime">One-time</option>
                    <option value="asneeded">As Needed</option>
                </select>
            </div>
            <div class="md:col-span-2">
                <label for="message" class="block text-[#03143A] font-semibold mb-2">Additional Details</label>
                <textarea id="message" name="message" rows="4" class="form-input w-full px-4 py-3 border border-gray-300 rounded-lg transition-all duration-300" placeholder="Tell us about your facility size, specific needs, or any special requirements..."></textarea>
            </div>
            <div class="md:col-span-2">
                <button type="submit" id="submit-btn" class="btn-primary w-full justify-center">
                    Submit Request
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
                <p class="text-sm text-[#666] mt-4 text-center">
                    Or call us directly at <a href="tel:+17133382553" class="text-[#C70532] font-semibold hover:text-[#03143A] transition-colors">(713) 338-2553</a> for immediate assistance
                </p>
            </div>
        </form>
    </div>

    <script>
        // Form submission handling
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form data
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // Get submit button
            const submitBtn = document.getElementById('submit-btn');
            const originalHtml = submitBtn.innerHTML;
            
            // Show loading state
            submitBtn.innerHTML = 'Sending...';
            submitBtn.disabled = true;
            
            // Simulate form submission (replace with actual API call)
            setTimeout(() => {
                // Show success message
                alert('Thank you for your inquiry! We will get back to you within 24 hours.');
                
                // Reset form
                this.reset();
                
                // Restore button
                submitBtn.innerHTML = originalHtml;
                submitBtn.disabled = false;
                
                // Track event if gtag exists
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'form_submit', {
                        'event_category': 'Contact',
                        'event_label': data.service
                    });
                }
            }, 1000);
        });

        // Auto-resize textarea
        const textarea = document.getElementById('message');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // Phone number formatting
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 0) {
                if (value.length <= 3) {
                    value = `(${value}`;
                } else if (value.length <= 6) {
                    value = `(${value.slice(0, 3)}) ${value.slice(3)}`;
                } else {
                    value = `(${value.slice(0, 3)}) ${value.slice(3, 6)}-${value.slice(6, 10)}`;
                }
            }
            e.target.value = value;
        });
    </script>
</body>
</html>
